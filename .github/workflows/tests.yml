name: Enterprise Selenium MCP Framework CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest requests faker python-dotenv PyYAML loguru jsonschema pydantic openpyxl pytest-html

      - name: Setup environment
        run: |
          mkdir -p reports screenshots logs data/excel data/json
          echo "BROWSER=chrome" > .env
          echo "HEADLESS=true" >> .env
          echo "BASE_URL=https://www.google.com" >> .env
          echo "MCP_ENABLED=false" >> .env
          echo "OLLAMA_ENABLED=false" >> .env
          echo "OLLAMA_MODEL=llama3.2:1b" >> .env
          echo "OLLAMA_URL=http://localhost:11434" >> .env
          echo "SCREENSHOT_ON_FAILURE=false" >> .env
          echo "ANTHROPIC_API_KEY=" >> .env
          echo "GEMINI_API_KEY=" >> .env
          echo "DB_URL=" >> .env
          echo "SELENIUM_GRID_URL=" >> .env
          echo "IMPLICIT_WAIT=10" >> .env
          echo "EXPLICIT_WAIT=20" >> .env
          echo "ALLURE_RESULTS_DIR=reports/allure-results" >> .env
          echo '{"valid_user":{"email":"test@example.com","password":"Test@1234","role":"customer"},"admin_user":{"email":"admin@example.com","password":"Admin@5678","role":"admin"},"invalid_user":{"email":"bad@example.com","password":"wrong"}}' > data/json/users.json
          python -c "
          import openpyxl
          wb = openpyxl.Workbook()
          ws = wb.active
          ws.title = 'SearchTests'
          ws.append(['topic','expected_in_url'])
          ws.append(['Python selenium','search'])
          wb.save('data/excel/search_data.xlsx')
          "

      - name: Run API tests
        run: pytest tests/api/test_api.py -v --html=reports/api-report.html --self-contained-html

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-report
          path: reports/api-report.html

  validate-framework:
    name: Validate Framework
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install faker python-dotenv PyYAML loguru openpyxl

      - name: Setup environment
        run: |
          mkdir -p reports screenshots logs data/excel data/json
          echo "BROWSER=chrome" > .env
          echo "HEADLESS=true" >> .env
          echo "BASE_URL=https://www.google.com" >> .env
          echo "MCP_ENABLED=false" >> .env
          echo "OLLAMA_ENABLED=false" >> .env
          echo "OLLAMA_MODEL=llama3.2:1b" >> .env
          echo "OLLAMA_URL=http://localhost:11434" >> .env
          echo "SCREENSHOT_ON_FAILURE=false" >> .env
          echo "ANTHROPIC_API_KEY=" >> .env
          echo "GEMINI_API_KEY=" >> .env
          echo "DB_URL=" >> .env
          echo "SELENIUM_GRID_URL=" >> .env
          echo "IMPLICIT_WAIT=10" >> .env
          echo "EXPLICIT_WAIT=20" >> .env
          echo "ALLURE_RESULTS_DIR=reports/allure-results" >> .env
          echo '{"valid_user":{"email":"test@example.com","password":"Test@1234","role":"customer"}}' > data/json/users.json

      - name: Validate config
        run: python -c "from config.config import config; config.validate(); print('Config OK')"

      - name: Validate data factory
        run: |
          python -c "
          from data.data_factory import DataFactory
          u = DataFactory.generate_user()
          assert '@' in u['email']
          print('DataFactory OK:', u['email'])
          "

      - name: Validate MCP planner
        run: |
          python -c "
          from mcp_agent.test_planner import MCPTestPlanner
          p = MCPTestPlanner()
          cases = p.generate_test_cases('login')
          assert len(cases) > 0
          print(f'MCP OK: {len(cases)} cases generated')
          "