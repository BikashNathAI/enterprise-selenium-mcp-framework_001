name: Enterprise Selenium MCP Framework CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── API Tests — runs in 30 seconds, no browser needed ────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html requests faker loguru python-dotenv PyYAML jsonschema pydantic

      - name: Create reports folder
        run: mkdir -p reports

      - name: Run API tests
        run: |
          pytest tests/api/test_api.py -v --html=reports/api-report.html --self-contained-html

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: reports/api-report.html

  # ── Data Validation Tests — no browser needed ─────────────
  data-tests:
    name: Data + Config Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest faker loguru python-dotenv PyYAML openpyxl

      - name: Create test data
        run: |
          python -c "
          import openpyxl
          wb = openpyxl.Workbook()
          ws = wb.active
          ws.title = 'SearchTests'
          ws.append(['topic', 'expected_in_url'])
          ws.append(['Python selenium', 'search'])
          ws.append(['pytest tutorial', 'search'])
          wb.save('data/excel/search_data.xlsx')
          print('Excel created!')
          "

      - name: Verify config loads
        run: |
          python -c "
          from config.config import config
          config.validate()
          print('Config OK!')
          "

      - name: Verify data factory
        run: |
          python -c "
          from data.data_factory import DataFactory
          u = DataFactory.generate_user()
          print('User generated:', u['email'])
          assert '@' in u['email']
          print('DataFactory OK!')
          "

      - name: Verify MCP agent imports
        run: |
          python -c "
          from mcp_agent.test_planner import MCPTestPlanner
          p = MCPTestPlanner()
          cases = p.generate_test_cases('login page')
          print(f'Generated {len(cases)} test cases')
          print('MCP Agent OK!')
          "

  # ── Summary ───────────────────────────────────────────────
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [api-tests, data-tests]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## Enterprise Selenium MCP Framework" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Tests | Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Config Validation | Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Agent | Completed |" >> $GITHUB_STEP_SUMMARY