name: Enterprise Selenium MCP Framework CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html requests faker loguru python-dotenv PyYAML jsonschema pydantic openpyxl

      - name: Create required folders
        run: |
          mkdir -p reports
          mkdir -p screenshots
          mkdir -p logs
          mkdir -p data/excel
          mkdir -p data/json

      - name: Create .env file
        run: |
          cat > .env << EOF
          BROWSER=chrome
          HEADLESS=true
          IMPLICIT_WAIT=10
          EXPLICIT_WAIT=20
          BASE_URL=https://www.google.com
          ANTHROPIC_API_KEY=
          MCP_ENABLED=false
          OLLAMA_ENABLED=false
          OLLAMA_MODEL=llama3.2:1b
          OLLAMA_URL=http://localhost:11434
          SELENIUM_GRID_URL=
          DB_URL=
          ALLURE_RESULTS_DIR=reports/allure-results
          SCREENSHOT_ON_FAILURE=false
          GEMINI_API_KEY=
          EOF

      - name: Create test data
        run: |
          python -c "
          import openpyxl
          wb = openpyxl.Workbook()
          ws = wb.active
          ws.title = 'SearchTests'
          ws.append(['topic', 'expected_in_url'])
          ws.append(['Python selenium', 'search'])
          ws.append(['pytest tutorial', 'search'])
          wb.save('data/excel/search_data.xlsx')
          print('Excel created!')
          "

      - name: Create users.json
        run: |
          cat > data/json/users.json << EOF
          {
            "valid_user": {
              "email": "testuser@example.com",
              "password": "Test@1234",
              "role": "customer"
            },
            "admin_user": {
              "email": "admin@example.com",
              "password": "Admin@5678",
              "role": "admin"
            },
            "invalid_user": {
              "email": "notexist@example.com",
              "password": "wrongpassword"
            }
          }
          EOF

      - name: Run API tests
        run: |
          pytest tests/api/test_api.py -v --html=reports/api-report.html --self-contained-html

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: reports/api-report.html

  config-tests:
    name: Config and Data Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install faker loguru python-dotenv PyYAML openpyxl

      - name: Create folders and files
        run: |
          mkdir -p reports screenshots logs data/excel data/json
          cat > .env << EOF
          BROWSER=chrome
          HEADLESS=true
          BASE_URL=https://www.google.com
          MCP_ENABLED=false
          OLLAMA_ENABLED=false
          OLLAMA_MODEL=llama3.2:1b
          OLLAMA_URL=http://localhost:11434
          SCREENSHOT_ON_FAILURE=false
          ANTHROPIC_API_KEY=
          GEMINI_API_KEY=
          DB_URL=
          EOF
          cat > data/json/users.json << EOF
          {"valid_user": {"email": "test@example.com", "password": "Test@1234", "role": "customer"}}
          EOF

      - name: Test config loads
        run: |
          python -c "
          from config.config import config
          config.validate()
          print('Config OK!')
          "

      - name: Test data factory
        run: |
          python -c "
          from data.data_factory import DataFactory
          u = DataFactory.generate_user()
          assert '@' in u['email']
          print('User:', u['email'])
          print('DataFactory OK!')
          "

      - name: Test MCP planner
        run: |
          python -c "
          from mcp_agent.test_planner import MCPTestPlanner
          p = MCPTestPlanner()
          cases = p.generate_test_cases('login page')
          assert len(cases) > 0
          print(f'Generated {len(cases)} cases')
          print('MCP Planner OK!')
          "

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [api-tests, config-tests]
    if: always()
    steps:
      - name: Results
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | Done |" >> $GITHUB_STEP_SUMMARY
          echo "| Config Tests | Done |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Agent | Done |" >> $GITHUB_STEP_SUMMARY